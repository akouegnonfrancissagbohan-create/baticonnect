// ============================================================
//  BATICONNECT — Système d'emails automatiques via Resend
//  Ce fichier contient toutes les fonctions d'envoi d'emails

const RESEND_KEY = 're_M6uUxMhX_7wx25h1bPFTxUYQRMJXRTCc3';
const FROM_EMAIL = 'BatiConnect <onboarding@resend.dev>';

// ── Fonction principale d'envoi ──
async function envoyerEmail(destinataire, sujet, html) {
  try {
    const response = await fetch('https://api.resend.com/emails', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${RESEND_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        from: FROM_EMAIL,
        to: [destinataire],
        subject: sujet,
        html: html
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.message || 'Erreur envoi email');
    console.log('Email envoyé à', destinataire);
    return data;
  } catch (err) {
    console.error('Erreur email:', err);
    throw err;
  }
}

      <div style="font-size:13px;color:#5F5E5A">Profil créé et prêt à être complété</div>

    <a href="https://akouegnonfrancissagbohan-create.github.io/baticonnect" style="display:block;background:#D85A30;color:white;text-align:center;padding:14px;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px">

  return await envoyerEmail(destinataire, `🎉 Bienvenue sur BatiConnect, ${prenom} !`, templateBase(contenu));

// ============================================================
// 5. EMAIL AVIS REÇU — Pour l'artisan

async function emailAvisRecu(destinataire, prenomArtisan, prenomClient, noteGlobale, commentaire, titresMission) {
  const etoiles = '★'.repeat(Math.round(noteGlobale)) + '☆'.repeat(5 - Math.round(noteGlobale));
  const couleurNote = noteGlobale >= 4.5 ? '#1D9E75' : noteGlobale >= 3 ? '#BA7517' : '#A32D2D';
  const contenu = `
    <h1 style="font-size:22px;font-weight:700;color:#2C2C2A;margin:0 0 8px">Vous avez reçu un avis ! ⭐</h1>
    <p style="font-size:14px;color:#5F5E5A;margin:0 0 24px">Bonjour ${prenomArtisan}, ${prenomClient} vient de noter votre travail.</p>

    <div style="background:#FAEEDA;border-radius:12px;padding:24px;margin-bottom:24px;text-align:center">
      <div style="font-size:40px;color:#BA7517;margin-bottom:8px">${etoiles}</div>
      <div style="font-size:42px;font-weight:700;color:${couleurNote}">${noteGlobale}/5</div>
      <div style="font-size:13px;color:#633806;margin-top:6px">Mission : ${titresMission}</div>
    </div>

    <div style="border-left:4px solid #D85A30;padding:14px 16px;background:#F9F8F5;border-radius:0 10px 10px 0;margin-bottom:24px">
      <div style="font-size:12px;color:#888780;margin-bottom:6px">Commentaire de ${prenomClient}</div>
      <div style="font-size:14px;color:#2C2C2A;font-style:italic">"${commentaire}"</div>
    </div>

    <a href="https://akouegnonfrancissagbohan-create.github.io/baticonnect/baticonnect-notation.html" style="display:block;background:#D85A30;color:white;text-align:center;padding:14px;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px">
      Voir mon profil →
    </a>`;

  return await envoyerEmail(destinataire, `⭐ ${prenomClient} vous a noté ${noteGlobale}/5 !`, templateBase(contenu));
}

    <div style="background:#FCEBEB;border-radius:12px;padding:20px;margin-bottom:24px">
      <div style="font-size:32px;margin-bottom:8px">⚠️</div>
      <div style="font-size:13px;color:#A32D2D;font-weight:600;margin-bottom:4px">${typePenalite}</div>
      <div style="font-size:28px;font-weight:700;color:#A32D2D">- ${montant} FCFA</div>
      ${joursRetard ? `<div style="font-size:13px;color:#A32D2D;margin-top:4px">Retard : ${joursRetard} jours</div>` : ''}
    </div>

    <div style="border:1.5px solid #F1EFE8;border-radius:12px;padding:16px;margin-bottom:24px">
      <div style="font-size:13px;color:#5F5E5A">Mission concernée : <strong>${titresMission}</strong></div>

    <div style="background:#FAEEDA;border-radius:10px;padding:14px;margin-bottom:24px">
      <p style="font-size:13px;color:#633806;margin:0">💡 Si vous pensez que cette pénalité est injuste, vous pouvez la contester depuis votre espace BatiConnect sous 48h.</p>

  return await envoyerEmail(destinataire, `⚠️ Pénalité de ${montant} FCFA — ${titresMission}`, templateBase(contenu));
}
